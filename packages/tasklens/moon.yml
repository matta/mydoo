tasks:
  build:
    command: 'pnpm tsc --emitDeclarationOnly'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'tsconfig.json'
    outputs:
      - 'dist'

  test:
    command: 'pnpm vitest run --coverage'
    inputs:
      - 'src/**/*'
      - 'tests/**/*'
    deps:
      - '~:build'

  generate-types:
    command: 'json2ts ./specs/compliance/schemas/test-case.schema.json ./specs/compliance/schemas/test-case.d.ts && pnpm prettier --write ./specs/compliance/schemas/test-case.d.ts'
    inputs:
      - 'specs/compliance/schemas/test-case.schema.json'
    outputs:
      - 'specs/compliance/schemas/test-case.d.ts'
