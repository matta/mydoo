fileGroups:
  sources:
    - 'src/**/*'
    - 'types/**/*'
    - 'specs/**/*'
  tests:
    - 'tests/**/*'
    - '**/tests/**/*'
    - '**/test/**/*'
  configs:
    - '*.config.*'
    - 'package.json'
    - 'tsconfig.json'
    - 'biome.json'
    - 'eslint.config.js'

tasks:
  # --- Format (Prettier) ---
  check-format:
    command: 'prettier --check .'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'
    options:
      cache: true

  fix-format:
    command: 'prettier --write .'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'
    options:
      cache: false
      runInCI: false

  # --- Types (TSC) ---
  check-types:
    command: 'tsc --noEmit'
    inputs:
      - '@group(sources)'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
    deps:
      # TypeScript Project References require upstream dependencies to be built
      # (emitting .d.ts files) before the consumer can type-check against them.
      - '^:build'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'
    options:
      cache: true

  # --- ESLint ---
  check-eslint:
    command: 'eslint .'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'
    options:
      cache: true
    deps:
      - 'root:check-biome'

  fix-eslint:
    command: 'eslint . --fix'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'
    options:
      cache: false
      runInCI: false

  # --- Aggregates ---
  check-style:
    deps:
      - 'root:check-biome'
      - '~:check-eslint'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'

  fix-style:
    deps:
      - 'root:fix-biome'
      - '~:fix-eslint'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'
    options:
      runInCI: false

  check:
    deps:
      - '~:check-style'
      - '~:check-format'
      - '~:check-types'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'

  fix:
    deps:
      - '~:fix-style'
      - '~:fix-format'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'
    options:
      runInCI: false
