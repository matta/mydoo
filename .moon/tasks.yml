fileGroups:
  sources:
    - 'src/**/*'
    - 'types/**/*'
    - 'specs/**/*'
  tests:
    - 'tests/**/*'
    - '**/tests/**/*'
    - '**/test/**/*'
  configs:
    - '*.config.*'
    - 'package.json'
    - 'tsconfig.json'
    - 'biome.json'
    - 'eslint.config.js'

tasks:


  typecheck:
    command: 'tsc --noEmit'
    inputs:
      - '@group(sources)'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'
    options:
      cache: true

  check-eslint:
    command: 'eslint .'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'
    options:
      cache: true
    deps:
      - 'root:lint'

  fix-eslint:
    command: 'eslint . --fix'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'
    options:
      cache: false

  check-style:
    deps:
      - 'root:lint'
      - '~:check-eslint'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'

  fix-style:
    deps:
      - 'root:fix'
      - '~:fix-eslint'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'

  check:
    deps:
      - 'root:lint'
      - '~:check-eslint'
      - '~:typecheck'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'

  fix:
    deps:
      - 'root:fix'
      - '~:fix-eslint'
    env:
      ANTIGRAVITY_AGENT: 'ANTIGRAVITY_AGENT'
      GEMINI_CLI: 'GEMINI_CLI'
      CI: 'CI'
